<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compra Concluída!</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f7f7f7;
            color: #333;
            line-height: 1.6;
        }

        .progress-container-top {
            width: 100%;
            background-color: #e0e0e0;
            height: 40px;
        }

        .progress-bar-success {
            width: 100%;
            height: 100%;
            background-color: #27ae60;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .main-container {
            max-width: 600px;
            margin: 40px auto;
            padding: 30px;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }

        .success-icon {
            font-size: 4rem;
            color: #27ae60;
            margin-bottom: 20px;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        p {
            margin-bottom: 20px;
            font-size: 1.05rem;
            color: #555;
        }

        .highlight-text {
            font-weight: bold;
            color: #000;
        }

        .whatsapp-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px dashed #eee;
        }

        .whatsapp-label {
            font-weight: 700;
            margin-bottom: 15px;
            display: block;
            font-size: 1.1rem;
            color: #002a52;
        }

        .btn-whatsapp {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #25D366;
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            padding: 15px 30px;
            border-radius: 50px;
            box-shadow: 0 4px 6px rgba(37, 211, 102, 0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            width: 100%;
            max-width: 350px;
        }

        .btn-whatsapp:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(37, 211, 102, 0.4);
            background-color: #1ebe57;
        }

        .btn-whatsapp span {
            margin-left: 10px;
        }

        @media (max-width: 600px) {
            .main-container {
                margin: 20px 15px;
                padding: 20px;
            }
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="progress-container-top">
        <div class="progress-bar-success">
            COMPRA 100% CONCLUÍDA!
        </div>
    </div>

    <div class="main-container">
        <div class="success-icon">✅</div>

        <h1>Parabéns pela sua compra!</h1>

        <p>
           <span class="highlight-text"></span>,
        </p>

        <p>
            <span class="highlight-text"></span>.
        </p>

        <div class="whatsapp-section">
            <span class="whatsapp-label">Clique no botão abaixo e fale com o suporte para pedir o seu acesso.</span>
            <a
                class="btn-whatsapp"
                href="https://wa.me/258863881471?text=Pe%C3%A7o%20o%20meu%20acesso."
                target="_blank"
                rel="noopener noreferrer"
            >
                <span>Falar com o suporte no WhatsApp</span>
            </a>
        </div>
    </div>

</body>
</html>
